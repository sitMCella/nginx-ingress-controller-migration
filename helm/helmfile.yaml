helmDefaults:
  wait: true
  timeout: 300
  recreatePods: false
  force: false

repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: haproxytech
    url: https://haproxytech.github.io/helm-charts

releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.15.1
    createNamespace: true
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "sh"
        args: ["-c", "echo 'Installing NGINX Ingress Controller v4.15.1 (ref: https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx)'"]
    values:
      - ./nginx_ingress_controller_values.yaml

  - name: haproxy-ingress
    namespace: haproxy-ingress
    chart: haproxytech/kubernetes-ingress
    version: 1.49.0
    createNamespace: true
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "sh"
        args: ["-c", "echo 'Installing HAProxy Ingress Controller v1.49.0 (app v3.2.6) (ref: https://artifacthub.io/packages/helm/haproxytech/kubernetes-ingress)'"]
    values:
      - ./haproxy_ingress_controller_values.yaml

  - name: application
    namespace: application
    chart: ./charts/application
    createNamespace: true
    values:
      - ./charts/application/values.yaml
    set:
      # Image registry from ACR - set via environment or pass directly
      # Example: helmfile --set image.registry=myregistry.azurecr.io sync
      - name: image.registry
        value: ${CONTAINER_REGISTRY_LOGIN_SERVER}