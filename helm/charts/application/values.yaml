namespace: "application"

image:
  registry: ""  # Will be populated by helmfile/terraform
  repository: "application"
  tag: "latest"
  pullPolicy: Always  # Force pull latest image from ACR to avoid local node cache

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: "app.local"
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

nodeSelector:
  beta.kubernetes.io/os: linux
  agentpool: system

tolerations:
  - key: "CriticalAddonsOnly"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

affinity: {}

autoscaling:
  enabled: false
